<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Parcelas">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Consulta de Parcelas</title>

  <!-- Arquivos usados pelo app quando ele roda publicado na raiz do GitHub Pages. -->
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/adr.jpeg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

  <div class="container">

    <!-- Cabecalho com o nome do app e uma mensagem de status dos dados offline. -->
    <header class="app-header">
      <img class="app-logo" src="icons/adr.jpeg" alt="Logo do app">
      <h1>Consulta de Parcelas Adriano Costa</h1>
    </header>

    <!-- Busca e listagem num so painel; marcar parcelas faz os cards aparecerem embaixo. -->
    <div class="search-box">
      <div class="painel-busca-lista" role="search" aria-label="Filtrar e selecionar parcelas">
        <input
          type="text"
          id="pesquisa"
          class="painel-busca-input"
          autocomplete="off"
          aria-label="Filtrar parcela, ano ou linhas"
          placeholder="Clique aqui para listar parcelas ou filtre depois"
        >
        <p id="lista-aviso-busca" class="lista-aviso-busca" hidden>
          Nenhuma parcela encontrada para esse texto.
        </p>
        <div
          id="lista-checkboxes"
          class="lista-checkboxes"
          role="group"
          aria-label="Selecionar parcelas"
        ></div>
      </div>
      <button id="botao-limpar" class="botao-secundario" type="button">Limpar</button>
    </div>

    <!-- O JavaScript atualiza estes blocos com o total e os cards encontrados. -->
    <div id="contador" class="contador"></div>
    <div id="resultado"></div>

  </div>

<!-- dados.js precisa carregar antes do script.js, pois nele fica a lista PARCELAS. -->
<script src="dados.js"></script>
<script src="script.js"></script>

</body>
</html>
