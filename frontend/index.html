<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Parcelas">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Consulta de Parcelas</title>

  <!-- Caminhos absolutos usados quando esta pagina e aberta no GitHub Pages. -->
  <link rel="stylesheet" href="/consulta_parcelas/style.css">
  <link rel="manifest" href="/consulta_parcelas/manifest.json">
  <link rel="icon" href="/consulta_parcelas/icons/adr.jpeg">
  <link rel="apple-touch-icon" href="/consulta_parcelas/icons/icon-192.png">
</head>
<body>

  <div class="container">

    <!-- Cabecalho com o nome do app e uma mensagem de status dos dados offline. -->
    <header class="app-header">
      <img class="app-logo" src="/consulta_parcelas/icons/adr.jpeg" alt="Logo do app">
      <h1>Consulta de Parcelas Adriano Costa</h1>
      <p id="status-dados">Dados carregados</p>
    </header>

    <!-- Campo de busca e botoes principais da consulta. -->
    <div class="search-box">
      <input type="text" id="pesquisa" placeholder="Digite a parcela">
      <button id="botao-consultar" type="button">Consultar</button>
      <button id="botao-limpar" class="botao-secundario" type="button">Limpar</button>
    </div>

    <!-- O JavaScript atualiza estes blocos com o total e os cards encontrados. -->
    <div id="contador" class="contador"></div>
    <div id="resultado"></div>

  </div>

<!-- dados.js precisa carregar antes do script.js, pois nele fica a lista PARCELAS. -->
<script src="/consulta_parcelas/dados.js"></script>
<script src="/consulta_parcelas/script.js"></script>

</body>
</html>
